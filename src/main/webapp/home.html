<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解忧小铺</title>
    <link rel="stylesheet" href="css/home.css">
    <style>
        html { scroll-behavior: smooth; }
        .section-block { min-height: 60vh; padding-top: 40px; margin-bottom: 40px; border-bottom: 1px dashed rgba(0,0,0,0.1); }
        .section-title { font-size: 24px; margin-bottom: 20px; padding-left: 15px; border-left: 5px solid #ff9f43; color: inherit; }
        .placeholder-text { opacity: 0.7; line-height: 1.8; margin-bottom: 15px; }
        .shop-list-container { margin-top: 20px; }
        .logout-btn { margin-left: 10px; padding: 4px 10px; background: #f5222d; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
<header class="banner">
    <button class="login-btn" id="loginBtn">☰ 登录 / 注册</button>
    <label class="mode-switch">
        <input type="checkbox" id="modeToggle">
        <span class="slider"></span>
    </label>
    <div class="banner-content">
        <h1>解忧小铺</h1>
        <p class="meta">© 2024-10-10 &nbsp;|&nbsp; 记录心情，寄存烦恼</p>
        <button class="banner-btn" onclick="location.href='#shopList'">逛店铺</button>
    </div>
</header>

<aside class="sidebar">
    <div class="sidebar-card">
        <h3>目录</h3>
        <ul>
            <li><a href="#home">首页</a></li>
            <li><a href="#shopList">店铺列表</a></li>
            <li><a href="personal.html" class="require-login">我的主页</a></li>
        </ul>
    </div>
</aside>

<main class="content">
    <div class="full-bg-layer">
        <div class="content-inner">
            <div id="home" style="height: 0;"></div>

            <div id="shopList" class="shop-list-container">
                <h2 class="section-title">店铺列表</h2>
                <div id="shopListContent">
                    <p class="placeholder-text">加载中...</p>
                </div>
            </div>

        </div>
    </div>
</main>

<div class="user-panel" id="userPanel">
    <div class="fold-tag"><<</div>
    <div class="panel-content">
        <div class="user-avatar">
            <img id="userPanelAvatar" src="https://picsum.photos/100/100?random=avatar" alt="用户头像">
        </div>
        <h3 id="userPanelName">游客</h3>
        <ul class="user-info" id="userPanelInfo">
            <li>请登录后查看</li>
        </ul>
        <button class="logout-btn" id="logoutBtn" style="display:none;">退出登录</button>
    </div>
</div>

<div class="modal-mask" id="loginModal">
    <div class="modal-box">
        <h2>登录 / 注册</h2>
        <div class="modal-tab">
            <span class="tab-item active" data-tab="login">登录</span>
            <span class="tab-item" data-tab="register">注册</span>
        </div>
        <div class="form-box login-form">
            <div class="input-item">
                <label>账号</label>
                <input type="text" id="loginUsername" name="username" placeholder="请输入账号">
            </div>
            <div class="input-item">
                <label>密码</label>
                <input type="password" id="loginPassword" name="password" placeholder="请输入密码">
            </div>
            <button class="submit-btn" id="loginSubmitBtn">登录</button>
        </div>
        <div class="form-box register-form" style="display: none;">
            <div class="input-item">
                <label>账号</label>
                <input type="text" id="regUsername" name="username" placeholder="请设置账号">
            </div>
            <div class="input-item">
                <label>密码</label>
                <input type="password" id="regPassword" name="password" placeholder="请设置密码">
            </div>
            <div class="input-item">
                <label>确认密码</label>
                <input type="password" id="regConfirmPwd" placeholder="再次输入密码">
            </div>
            <button class="submit-btn" id="registerSubmitBtn">注册</button>
        </div>
    </div>
</div>

<script src="js/home.js?v=2026062504"></script>
</body>
</html>
