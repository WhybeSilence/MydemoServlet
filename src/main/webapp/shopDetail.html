<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店铺详情 - 解忧小铺</title>
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/shopDetail.css">
    <style>
        .add-product-btn {
            margin-bottom: 15px;
            padding: 10px 20px;
            background: #52c41a;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .owner-btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .owner-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
        }
        .btn-edit { background: #409eff; }
        .btn-remove { background: #f5222d; }

        .modal-mask {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        .modal-box {
            width: 450px;
            background: var(--card-light);
            border-radius: 10px;
            padding: 25px;
            max-height: 90vh;
            overflow-y: auto;
        }
        body.dark .modal-box { background: var(--card-dark); }
        .modal-box h3 { margin-bottom: 15px; }
        .form-item { margin-bottom: 12px; }
        .form-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-item input, .form-item textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: transparent;
            color: inherit;
        }
        body.dark .form-item input,
        body.dark .form-item textarea { border-color: #444; }
        .form-item textarea { min-height: 60px; resize: vertical; }
        .modal-btn-group { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        .modal-btn {
            padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer;
        }
        .modal-btn-cancel { background: #ccc; color: #333; }
        .modal-btn-confirm { background: #52c41a; color: #fff; }
    </style>
</head>
<body>
<header class="banner">
    <button class="login-btn" id="loginBtn">☰ 登录 / 注册</button>
    <label class="mode-switch">
        <input type="checkbox" id="modeToggle">
        <span class="slider"></span>
    </label>
    <div class="banner-content">
        <h1>店铺详情</h1>
        <p class="meta">查看店铺商品与详细信息</p>
        <button class="banner-btn" onclick="location.href='home.html'">返回首页</button>
    </div>
</header>

<aside class="sidebar">
    <div class="sidebar-card">
        <h3>目录</h3>
        <ul>
            <li><a href="home.html">首页</a></li>
            <li><a href="#shopInfo">店铺信息</a></li>
            <li><a href="#goods">商品列表</a></li>
            <li><a href="personal.html" class="require-login">我的主页</a></li>
        </ul>
    </div>
</aside>

<main class="content">
    <div class="full-bg-layer">
        <div class="content-inner">
            <div id="shopInfo" class="shop-info-card">
                <h2 id="shopName">加载中...</h2>
                <span class="shop-status" id="shopStatus">--</span>
                <p class="shop-desc" id="shopDesc">加载中...</p>
                <p style="margin-top:10px; opacity:0.8;">店主：<span id="shopOwner">--</span></p>
            </div>

            <h2 id="goods" class="goods-title">店铺商品列表</h2>

            <div id="ownerActions" style="display:none;">
                <button class="add-product-btn" onclick="openAddModal()">+ 上架商品</button>
            </div>

            <div id="productList">
                <p style="opacity:0.6;">加载中...</p>
            </div>
        </div>
    </div>
</main>

<div class="user-panel" id="userPanel">
    <div class="fold-tag"><<</div>
    <div class="panel-content">
        <div class="user-avatar">
            <img id="userPanelAvatar" src="https://picsum.photos/100/100?random=avatar" alt="用户头像">
        </div>
        <h3 id="userPanelName">游客</h3>
        <ul class="user-info" id="userPanelInfo">
            <li>请登录后查看</li>
        </ul>
        <button class="logout-btn" id="logoutBtn" style="display:none; margin-top:10px; padding:4px 10px; background:#f5222d; border:none; border-radius:4px; color:#fff; cursor:pointer; font-size:12px;">退出登录</button>
    </div>
</div>

<div class="modal-mask" id="loginModal">
    <div class="modal-box">
        <h2>登录 / 注册</h2>
        <div class="modal-tab">
            <span class="tab-item active" data-tab="login">登录</span>
            <span class="tab-item" data-tab="register">注册</span>
        </div>
        <div class="form-box login-form">
            <div class="input-item">
                <label>账号</label>
                <input type="text" id="loginUsername" name="username" placeholder="请输入账号">
            </div>
            <div class="input-item">
                <label>密码</label>
                <input type="password" id="loginPassword" name="password" placeholder="请输入密码">
            </div>
            <button class="submit-btn" id="loginSubmitBtn">登录</button>
        </div>
        <div class="form-box register-form" style="display: none;">
            <div class="input-item">
                <label>账号</label>
                <input type="text" id="regUsername" name="username" placeholder="请设置账号">
            </div>
            <div class="input-item">
                <label>密码</label>
                <input type="password" id="regPassword" name="password" placeholder="请设置密码">
            </div>
            <div class="input-item">
                <label>确认密码</label>
                <input type="password" id="regConfirmPwd" placeholder="再次输入密码">
            </div>
            <button class="submit-btn" id="registerSubmitBtn">注册</button>
        </div>
    </div>
</div>

<div class="modal-mask" id="productModal">
    <div class="modal-box">
        <h3 id="productModalTitle">上架商品</h3>
        <input type="hidden" id="editProductId">
        <div class="form-item">
            <label>商品名称</label>
            <input type="text" id="productName" placeholder="请输入商品名称">
        </div>
        <div class="form-item">
            <label>价格（元）</label>
            <input type="number" id="productPrice" step="0.01" placeholder="请输入价格">
        </div>
        <div class="form-item">
            <label>库存数量</label>
            <input type="number" id="productStock" placeholder="请输入库存数量">
        </div>
        <div class="form-item">
            <label>商品描述</label>
            <textarea id="productDesc" placeholder="请输入商品描述"></textarea>
        </div>
        <div class="form-item">
            <label>预览图URL</label>
            <input type="text" id="productPreviewUrl" placeholder="请输入图片URL">
        </div>
        <div class="modal-btn-group">
            <button class="modal-btn modal-btn-cancel" onclick="closeProductModal()">取消</button>
            <button class="modal-btn modal-btn-confirm" onclick="submitProduct()">确定</button>
        </div>
    </div>
</div>

<script src="./js/home.js?v=2026062504"></script>
<script src="./js/shopDetail.js?v=2026062504"></script>
</body>
</html>
